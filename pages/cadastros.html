<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EBAN — Lançamentos</title>
  <meta name="description" content="Gestão de clientes, fornecedores e impostos com previsões de vencimento." />
  <link rel="icon" href="../images/favicon.svg" type="image/svg+xml" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
  <div class="min-h-screen flex">
    <aside id="sidebar" class="hidden md:flex w-64 shrink-0 flex-col border-r border-border bg-surface"></aside>
    <div id="topbar" class="md:hidden fixed inset-x-0 top-0 z-30 bg-surface border-b border-border"></div>
    <main class="flex-1 min-w-0 pt-16 md:pt-0">
      <div class="mx-auto max-w-[1280px] px-6 md:px-10 py-8 md:py-12 space-y-8">
        <header class="animate-fade-up">
          <p class="text-sm font-medium uppercase tracking-wider text-muted-foreground">Gestão</p>
          <h1 class="font-display font-bold text-3xl md:text-4xl mt-2">Lançamentos</h1>
          <p class="text-muted-foreground mt-2 max-w-xl">Acompanhe seus clientes, fornecedores e tributos com previsões claras de vencimento.</p>
        </header>

        <div class="rounded-xl bg-surface shadow-soft-md overflow-hidden animate-fade-up">
          <div class="flex items-center justify-between border-b border-border px-2 md:px-4 flex-wrap gap-2">
            <div class="flex">
              <button data-tab="clientes" class="tab-btn active relative px-4 py-4 text-sm font-medium transition-settle">
                Clientes
                <span class="tab-underline absolute left-3 right-3 -bottom-px h-0.5 rounded-full bg-accent"></span>
              </button>
              <button data-tab="fornecedores" class="tab-btn relative px-4 py-4 text-sm font-medium transition-settle">
                Fornecedores
                <span class="tab-underline absolute left-3 right-3 -bottom-px h-0.5 rounded-full bg-accent"></span>
              </button>
              <button data-tab="impostos" class="tab-btn relative px-4 py-4 text-sm font-medium transition-settle">
                Impostos
                <span class="tab-underline absolute left-3 right-3 -bottom-px h-0.5 rounded-full bg-accent"></span>
              </button>
            </div>
            <div class="flex items-center gap-2 px-2">
              <div class="hidden sm:flex items-center gap-2">
                <i data-lucide="search" class="w-4 h-4 text-muted-foreground"></i>
                <input id="busca" placeholder="Buscar..." class="bg-transparent text-sm outline-none placeholder:text-muted-foreground py-2 w-40" />
              </div>
              <button id="btnAdicionar" class="inline-flex items-center gap-1.5 rounded-md bg-primary px-3 py-1.5 text-sm font-medium text-primary-foreground shadow-soft-sm hover:opacity-90 transition-settle">
                <i data-lucide="plus" class="w-4 h-4"></i> Adicionar
              </button>
            </div>
          </div>

          <div class="grid grid-cols-12 px-6 py-3 text-xs font-medium uppercase tracking-wider text-muted-foreground border-b border-border bg-surface-alt">
            <div class="col-span-7">Nome</div>
            <div class="col-span-3">Previsão de vencimento</div>
            <div class="col-span-2 text-right">Valor</div>
          </div>

          <ul id="lista" class="divide-y divide-[hsl(var(--border))]"></ul>
        </div>
      </div>
    </main>
  </div>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="../js/layout.js"></script>
  <script src="../js/cadastros.js"></script>
</body>
</html>
